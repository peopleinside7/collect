@font-face { font-family: 'GmarketSans'; font-weight: 500; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansMedium.woff') format('woff'); }
@font-face { font-family: 'GmarketSans'; font-weight: 700; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/GmarketSansBold.woff') format('woff'); }
</style>
<style>
:root {
  --main:#5E69EE;--main-light:#7B85F3;--main-dark:#4A54D4;--main-bg:#EEEFFE;
  --main-gradient:linear-gradient(135deg,#5E69EE 0%,#7B61FF 50%,#39AFEA 100%);
  --secondary:#4F4FFB;--secondary-light:#6B6BFC;--secondary-dark:#3A3AD9;--secondary-bg:#F0F0FE;
  --accent:#39AFEA;--accent-light:#5BC4F2;--accent-dark:#2A95CC;
  --bg-white:#FFFFFF;--bg-page:#F7F8FC;
  --bg-sidebar:#1A1A3E;--bg-sidebar-hover:#2A2A5E;--bg-sidebar-active:#5E69EE;
  --text-primary:#1A1A2E;--text-secondary:#6B7280;--text-on-main:#FFFFFF;
  --text-on-sidebar:#B8B8D0;--text-on-sidebar-active:#FFFFFF;
  --border:#E0E3F1;--border-focus:#5E69EE;
  --success:#10B981;--warning:#F59E0B;--danger:#EF4444;--info:#39AFEA;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'GmarketSans','Pretendard','Apple SD Gothic Neo',system-ui,sans-serif;background:var(--bg-page);color:var(--text-primary)}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit;transition:all .2s ease}
input,textarea,select{font-family:inherit;font-size:inherit;transition:all .2s ease}
input:focus,textarea:focus,select:focus{outline:2px solid var(--main);outline-offset:2px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-weight:600;font-size:14px}
.btn-main{background:var(--main);color:#fff}.btn-main:hover{background:var(--main-light);box-shadow:0 0 20px rgba(94,105,238,.3)}
.btn-accent{background:var(--accent);color:#fff}.btn-accent:hover{background:var(--accent-light);box-shadow:0 0 20px rgba(57,175,234,.3)}
.btn-secondary{background:transparent;color:var(--secondary);border:2px solid var(--secondary)}.btn-secondary:hover{background:var(--secondary-bg)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-outline{background:transparent;color:var(--text-secondary);border:1px solid var(--border)}.btn-outline:hover{background:var(--main-bg);border-color:var(--main);color:var(--main)}
.btn-sm{padding:6px 14px;font-size:13px}.btn-xs{padding:4px 10px;font-size:12px}
#toast-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px}
.toast{padding:14px 20px;border-radius:12px;color:#fff;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.15);animation:slideIn .3s ease;min-width:250px;display:flex;align-items:center;gap:10px}
.toast.success{background:var(--success)}.toast.error{background:var(--danger)}.toast.info{background:var(--info)}.toast.warning{background:var(--warning)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal{background:#fff;border-radius:24px;padding:32px;max-width:560px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.2)}
.modal h2{font-size:20px;font-weight:700;margin-bottom:24px;color:var(--text-primary)}
.modal-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.login-page{min-height:100vh;background:url('https://images.unsplash.com/photo-1522383225653-ed111181a951?w=1920&q=80') center/cover no-repeat fixed;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-page::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.08)}
.login-card{background:rgba(255,255,255,0.88);backdrop-filter:blur(10px);border-radius:20px;padding:32px 28px;max-width:280px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.12);position:relative;z-index:1}
.login-card .logo{text-align:center;margin-bottom:20px}
.login-card .logo h1{font-size:11px;font-weight:500;color:var(--text-secondary);letter-spacing:1px}
.login-card .logo p{color:var(--text-primary);font-size:18px;font-weight:700;margin-top:6px;line-height:1.3}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:5px}
.form-group input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:8px;font-size:14px}
.form-group input:focus{border-color:var(--main)}
.login-btn{width:100%;padding:12px;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:700}
.login-btn:hover{background:var(--accent-light);box-shadow:0 0 20px rgba(57,175,234,.3)}
.login-error{color:var(--danger);font-size:13px;margin-top:8px;text-align:center}
.admin-header{height:64px;background:var(--main-gradient);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100}
.admin-header .logo{color:#fff;font-size:20px;font-weight:800;letter-spacing:-.5px}
.admin-header .actions{display:flex;gap:8px}
.admin-header .actions button{background:rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500}
.admin-header .actions button:hover{background:rgba(255,255,255,.25)}
.admin-body{display:flex;height:calc(100vh - 64px)}
.sidebar{width:260px;min-width:260px;background:var(--bg-sidebar);color:var(--text-on-sidebar);overflow-y:auto;display:flex;flex-direction:column}
.sidebar-section{padding:16px 16px 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:rgba(184,184,208,.6)}
.sidebar-item{padding:12px 20px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;transition:all .2s;position:relative;border-left:4px solid transparent}
.sidebar-item:hover{background:var(--bg-sidebar-hover)}
.sidebar-item.active{background:var(--bg-sidebar-active);color:#fff;border-left-color:#fff}
.sidebar-item .gear{position:absolute;right:12px;opacity:0;transition:opacity .2s;font-size:14px;padding:4px;border-radius:4px}
.sidebar-item:hover .gear{opacity:1}
.sidebar-item .gear:hover{background:rgba(255,255,255,.1)}
.sidebar-add{padding:18px 20px;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;margin:16px 12px;border-radius:12px;background:linear-gradient(135deg,#39AFEA 0%,#5BC4F2 100%);color:#fff;box-shadow:0 4px 16px rgba(57,175,234,.35);transition:all .2s}
.sidebar-add:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(57,175,234,.45);background:linear-gradient(135deg,#2A95CC 0%,#39AFEA 100%)}
.main-content{flex:1;overflow-y:auto;padding:24px}
.stats-bar{display:flex;gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 4px 24px rgba(94,105,238,.08);display:flex;align-items:center;gap:16px;flex:1}
.stat-card .stat-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.stat-card .stat-icon.purple{background:var(--main-bg)}.stat-card .stat-icon.blue{background:#E8F7FE}
.stat-card .stat-num{font-size:28px;font-weight:800}.stat-card .stat-label{font-size:13px;color:var(--text-secondary)}
.project-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.project-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(94,105,238,.12);transition:all .2s}
.project-card:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(94,105,238,.18)}
.project-card-top{height:6px;background:var(--main)}
.project-card-body{padding:20px}
.project-card-body h3{font-size:16px;font-weight:700;margin-bottom:12px}
.project-card-cols{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.project-card-col{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.project-card-col .col-name{color:var(--text-secondary)}
.badge{background:var(--accent);color:#fff;border-radius:20px;padding:2px 10px;font-size:12px;font-weight:600}
.project-card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border)}
.project-card-footer .users{font-size:13px;color:var(--text-secondary)}
.project-card-footer .goto{color:var(--accent);font-size:13px;font-weight:600;cursor:pointer}
.project-card-footer .goto:hover{text-decoration:underline}
.project-info-bar{background:#fff;border-radius:16px;padding:20px 24px;margin-bottom:20px;box-shadow:0 4px 24px rgba(94,105,238,.08)}
.project-info-bar h2{font-size:18px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;word-break:break-all}
.url-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;font-size:14px}
.url-row .url{color:var(--text-secondary);background:var(--bg-page);padding:8px 14px;border-radius:8px;flex:1;font-family:monospace;font-size:13px}
.tool-row{display:flex;gap:10px;flex-wrap:wrap}
.table-container{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(94,105,238,.08)}
.table-toolbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border)}
.table-scroll{overflow-x:auto;max-height:calc(100vh - 340px);overflow-y:auto}
.data-table{width:100%;border-collapse:collapse;min-width:600px}
.data-table thead{position:sticky;top:0;z-index:10}
.data-table th{background:var(--main);color:#fff;font-weight:600;font-size:13px;padding:12px 14px;text-align:left;white-space:nowrap;border-right:1px solid rgba(255,255,255,.1);position:relative}
.data-table th:last-child{border-right:none}
.data-table th .col-del{position:absolute;top:4px;right:4px;background:rgba(255,255,255,.2);border:none;color:#fff;width:20px;height:20px;border-radius:4px;font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.data-table th:hover .col-del{display:flex}
.data-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border);position:relative}
.data-table tr:nth-child(even) td{background:var(--bg-white)}
.data-table tr:nth-child(odd) td{background:var(--main-bg)}
.data-table tr:hover td{background:var(--secondary-bg)}
.data-table .cell-edit{width:100%;border:2px solid var(--border-focus);border-radius:4px;padding:6px 8px;font-size:13px;background:#fff}
.data-table .sticky-col{position:sticky;z-index:5}
.data-table .col-no{width:50px;min-width:50px;left:0}
.data-table td.col-no{background:var(--bg-page)!important;font-weight:500}
.data-table .col-add-btn{width:40px;background:var(--main-dark)!important;text-align:center;cursor:pointer}
.data-table .col-add-btn:hover{background:var(--main-light)!important}
.add-row-btn{width:100%;padding:10px;text-align:center;color:var(--text-secondary);font-size:13px;cursor:pointer;border-top:1px solid var(--border)}
.add-row-btn:hover{background:var(--main-bg);color:var(--main)}
.file-link{color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px;text-decoration:underline}
.file-link:hover{color:var(--accent-dark)}
.row-checkbox{width:16px;height:16px;cursor:pointer;accent-color:var(--main)}
.mini-dash{background:#fff;border-radius:16px;padding:16px 24px;margin-bottom:20px;box-shadow:0 4px 24px rgba(94,105,238,.08);display:flex;align-items:center;gap:16px;flex-wrap:wrap;word-break:break-all}
.mini-dash .md-item{display:flex;align-items:center;gap:6px;font-size:13px}
.mini-dash .md-label{color:var(--text-secondary)}.mini-dash .md-value{font-weight:700}
.user-page{min-height:100vh;background:var(--bg-page)}
.user-header{background:var(--main-gradient);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.user-header .project-name{color:#fff;font-size:18px;font-weight:700}
.user-header .user-info{display:flex;align-items:center;gap:12px;color:#fff;font-size:14px}
.user-header .user-info button{background:rgba(255,255,255,.15);color:#fff;border-radius:6px;padding:6px 12px;font-size:12px}
.user-header .user-info button:hover{background:rgba(255,255,255,.25)}
.user-form-container{max-width:960px;margin:0 auto;padding:24px 16px}
.user-table-wrap{overflow-x:auto;background:#fff;border-radius:16px;box-shadow:0 2px 12px rgba(94,105,238,.06);margin-bottom:16px;-webkit-overflow-scrolling:touch}
.user-data-table{width:100%;border-collapse:collapse}
.user-data-table th{background:var(--main);color:#fff;font-weight:600;font-size:12px;padding:8px 8px;text-align:center;white-space:nowrap}
.user-data-table td{padding:5px 6px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:top}
.user-data-table tr:nth-child(even) td{background:var(--bg-white)}
.user-data-table tr:nth-child(odd) td{background:var(--main-bg)}
.user-data-table input[type="text"]{width:100%;min-width:0;padding:7px 8px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;box-sizing:border-box}
/* PC: 8개까지 한 화면, 9개+ 가로 스크롤 */
@media(min-width:768px){.user-data-table{table-layout:fixed}.user-data-table th,.user-data-table td{max-width:calc(100vw / 9)}}
/* 모바일: 세로 카드형 변환 */
.mobile-card-list{display:none}
@media(max-width:767px){
  .user-table-wrap{overflow:visible}
  .user-data-table{display:none}
  .mobile-card-list{display:block}
  .mobile-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(94,105,238,.08);border-left:4px solid var(--main)}
  .mobile-card .mc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
  .mobile-card .mc-header span{font-size:14px;font-weight:700;color:var(--main)}
  .mobile-card .mc-field{margin-bottom:10px}
  .mobile-card .mc-field:last-child{margin-bottom:0}
  .mobile-card .mc-field label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:4px}
  .mobile-card .mc-field input[type="text"]{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;box-sizing:border-box}
  .mobile-card .mc-field input[type="text"]:focus{border-color:var(--main)}
}
.user-data-table input[type="text"]:focus{border-color:var(--main)}
.user-data-table .file-cell{display:flex;flex-direction:column;gap:4px}
.user-data-table .file-cell .file-attach-label{color:var(--accent);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:2px}
.user-data-table .file-cell .file-preview-sm{font-size:11px;color:var(--text-secondary);display:flex;align-items:center;gap:4px;background:var(--main-bg);padding:3px 6px;border-radius:4px;margin-top:2px}
.user-data-table .file-cell .file-preview-sm .fremove{color:var(--danger);cursor:pointer;margin-left:4px}
.user-row-actions{display:flex;align-items:center;gap:4px}
.user-row-actions button{padding:4px 8px;font-size:12px;border-radius:4px}
.user-add-row{padding:12px;text-align:center;color:var(--accent);font-weight:600;cursor:pointer;font-size:14px;border-top:1px solid var(--border)}
.user-add-row:hover{background:var(--main-bg)}
.user-excel-section{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(94,105,238,.06)}
.user-excel-section h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text-secondary);display:flex;align-items:center;gap:8px}
.user-excel-btns{display:flex;gap:10px;flex-wrap:wrap}
.user-actions{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.save-btn{width:100%;padding:16px;border-radius:12px;background:var(--accent);color:#fff;font-size:16px;font-weight:700}
.save-btn:hover{background:var(--accent-light);box-shadow:0 0 24px rgba(57,175,234,.3)}
.delete-my-btn{width:100%;padding:14px;border-radius:12px;background:transparent;color:var(--danger);border:2px solid var(--danger);font-size:14px;font-weight:600}
.delete-my-btn:hover{background:var(--danger);color:#fff}
.last-saved{text-align:center;font-size:13px;color:var(--text-secondary)}
.desktop-guard{min-height:100vh;background:var(--main-gradient);display:flex;align-items:center;justify-content:center;padding:32px}
.desktop-guard .guard-card{background:#fff;border-radius:24px;padding:48px;max-width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.15)}
.desktop-guard .guard-card .icon{font-size:64px;margin-bottom:16px}
.desktop-guard .guard-card h2{font-size:20px;font-weight:700;margin-bottom:12px}
.desktop-guard .guard-card p{color:var(--text-secondary);font-size:14px;line-height:1.6}
.error-page{min-height:100vh;background:var(--main-gradient);display:flex;align-items:center;justify-content:center}
.error-card{background:#fff;border-radius:24px;padding:48px;max-width:420px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.15)}
.error-card .icon{font-size:64px;margin-bottom:16px}
.error-card h2{font-size:20px;font-weight:700;margin-bottom:8px}
.error-card p{color:var(--text-secondary);margin-bottom:24px}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:var(--bg-page)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--text-secondary)}
.drag-item{background:var(--main-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.drag-item .drag-handle{cursor:grab;color:var(--text-secondary)}.drag-item .drag-num{color:var(--text-secondary);font-size:13px;width:24px}
.drag-item input{flex:1;border:none;background:transparent;font-size:14px;padding:4px}.drag-item input:focus{outline:none}
.drag-item .drag-del{color:var(--danger);cursor:pointer;padding:4px;opacity:.6}.drag-item .drag-del:hover{opacity:1}
.drag-item .drag-arrows{display:flex;gap:2px}
.drag-item .drag-arrows button{background:var(--main);color:#fff;border:none;border-radius:4px;width:24px;height:24px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;line-height:1}
.drag-item .drag-arrows button:hover{background:var(--main-light);box-shadow:0 0 8px rgba(94,105,238,.3)}
.drag-item .drag-arrows button:disabled{background:var(--border);color:var(--text-secondary);cursor:default;box-shadow:none}
.dropdown{position:fixed;background:#fff;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:8px;min-width:160px;z-index:200}
.dropdown-item{padding:10px 14px;font-size:13px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px}
.dropdown-item:hover{background:var(--main-bg)}
.dropdown-item.danger{color:var(--danger)}.dropdown-item.danger:hover{background:#FEE2E2}
@media(max-width:767px){
  .user-form-container{padding:16px}.user-excel-btns{flex-direction:column}.user-header{padding:12px 16px}.user-header .project-name{font-size:16px}
  .sidebar{width:200px;min-width:200px}
  .admin-header{padding:0 12px}.admin-header .logo{font-size:16px}
  .main-content{padding:12px}
  .stats-bar{flex-direction:column}
  .mini-dash{flex-direction:column;gap:8px}
  .project-info-bar .url-row{flex-direction:column;gap:6px}
  .tool-row{flex-direction:column}
}
@media(max-width:480px){
  .sidebar{position:fixed;left:-260px;top:64px;height:calc(100vh - 64px);z-index:90;transition:left .3s ease;box-shadow:4px 0 24px rgba(0,0,0,.3)}
  .sidebar.sb-open{left:0}
  .sb-overlay{display:none;position:fixed;inset:0;top:64px;background:rgba(0,0,0,.3);z-index:89}
  .sb-overlay.active{display:block}

/* ── 주제 설명 박스 (Topic description before questions) ── */

.field-type-toggle{display:flex;gap:4px;margin-left:auto}

</style>

<body>
<div id="toast-container"></div>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════
// People-In Hub — Smart Data Collector
// Single-file SPA with Supabase REST API backend
// ═══════════════════════════════════════════════════

const SUPABASE_URL='https://qhulwtunogbpzlbhtvcp.supabase.co';
const SUPABASE_KEY='sb_publishable_OliwNHYmloBjvSfZTTPg3A_rsRQ8Z9k';
const HEADERS={'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
const HEADERS_RETURN={...HEADERS,'Prefer':'return=representation'};

const DB={
  async _fetch(path,opts={}){
    const url=SUPABASE_URL+'/rest/v1/'+path;
    const res=await fetch(url,{headers:opts.headers||HEADERS,...opts});
    if(!res.ok){const t=await res.text();console.error('DB Error:',res.status,t);if(res.status>=500)showToast('서버 오류가 발생했습니다','error');throw new Error(t)}
    if(res.status===204)return null; // DELETE 등 빈 응답
    const ct=res.headers.get('content-type');
    if(ct&&ct.includes('json')){try{return await res.json()}catch(e){return null}}
    return null;
  },

  // ── Admin ──
  async getAdmin(){
    const rows=await this._fetch('admin?select=*&limit=1');
    if(rows&&rows.length)return rows[0];
    // seed admin (한 번만 시도, 실패 시 기본값 반환)
    try{
      const ins=await this._fetch('admin',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({username:'admin',password:'nuri0316',login_attempts:0,locked_until:null})});
      return ins[0];
    }catch(e){
      console.error('Admin seed failed:',e);
      return {id:1,username:'admin',password:'nuri0316',login_attempts:0,locked_until:null};
    }
  },
  async setAdmin(a){
    await this._fetch('admin?id=eq.'+a.id,{method:'PATCH',headers:HEADERS_RETURN,body:JSON.stringify({password:a.password,login_attempts:a.login_attempts,locked_until:a.locked_until})});
  },

  // ── Projects (with columns) ──
  _getFieldTypes(){try{return JSON.parse(localStorage.getItem('pih_fieldTypes'))||{}}catch(e){return{}}},
  _saveFieldType(colId,ft){const m=this._getFieldTypes();m[colId]=ft;localStorage.setItem('pih_fieldTypes',JSON.stringify(m))},
  _saveFieldTypes(cols){const m=this._getFieldTypes();cols.forEach(c=>{if(c.id)m[c.id]=c.fieldType||'text'});localStorage.setItem('pih_fieldTypes',JSON.stringify(m))},

  async getProjects(){
    const ps=await this._fetch('projects?select=*,project_columns(*)&order=display_order');
    const ftCache=this._getFieldTypes();
    return (ps||[]).map(p=>({
      id:p.id,name:p.name,slug:p.slug,layoutType:p.layout_type,displayOrder:p.display_order,dataVersion:p.data_version,description:p.description||'',createdAt:p.created_at,
      columns:(p.project_columns||[]).map(c=>({id:c.id,label:c.label,order:c.col_order,fieldType:c.field_type||ftCache[c.id]||'text'})).sort((a,b)=>a.order-b.order)
    }));
  },
  async createProject(p){
    const body={name:p.name,slug:p.slug,layout_type:p.layoutType,display_order:p.displayOrder,data_version:0};
    if(p.description!==undefined)body.description=p.description;
    const ins=await this._fetch('projects',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify(body)});
    const proj=ins[0];
    if(p.columns&&p.columns.length){
      try{
        const colRows=p.columns.map((c,i)=>({project_id:proj.id,label:c.label,col_order:i,field_type:c.fieldType||'text'}));
        const inserted=await this._fetch('project_columns',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify(colRows)});
        if(inserted)this._saveFieldTypes(inserted.map((r,i)=>({id:r.id,fieldType:p.columns[i].fieldType||'text'})));
      }catch(e){
        console.warn('field_type fallback:',e.message);
        const colRows=p.columns.map((c,i)=>({project_id:proj.id,label:c.label,col_order:i}));
        const inserted=await this._fetch('project_columns',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify(colRows)});
        // DB에 field_type 없어도 localStorage에 저장
        if(inserted)this._saveFieldTypes(inserted.map((r,i)=>({id:r.id,fieldType:p.columns[i].fieldType||'text'})));
      }
    }
    return proj.id;
  },
  async updateProject(pid,data){
    const body={};
    if(data.name!==undefined)body.name=data.name;
    if(data.layoutType!==undefined)body.layout_type=data.layoutType;
    if(data.displayOrder!==undefined)body.display_order=data.displayOrder;
    if(data.dataVersion!==undefined)body.data_version=data.dataVersion;
    if(data.description!==undefined)body.description=data.description;
    await this._fetch('projects?id=eq.'+pid,{method:'PATCH',headers:HEADERS_RETURN,body:JSON.stringify(body)});
  },
  async deleteProject(pid){
    // delete cells for rows in this project (batch by 50 to avoid URL length overflow)
    const rows=await this._fetch('data_rows?project_id=eq.'+pid+'&select=id');
    if(rows&&rows.length){
      const rids=rows.map(r=>r.id);
      for(let i=0;i<rids.length;i+=50){
        const chunk=rids.slice(i,i+50);
        await this._fetch('data_cells?row_id=in.('+chunk.join(',')+')',{method:'DELETE',headers:HEADERS});
      }
    }
    await this._fetch('data_rows?project_id=eq.'+pid,{method:'DELETE',headers:HEADERS});
    await this._fetch('users?project_id=eq.'+pid,{method:'DELETE',headers:HEADERS});
    await this._fetch('project_columns?project_id=eq.'+pid,{method:'DELETE',headers:HEADERS});
    await this._fetch('projects?id=eq.'+pid,{method:'DELETE',headers:HEADERS});
  },
  async setProjectColumns(pid,cols){
    await this._fetch('project_columns?project_id=eq.'+pid,{method:'DELETE',headers:HEADERS});
    if(cols.length){
      let inserted;
      try{
        const colRows=cols.map((c,i)=>({project_id:pid,label:c.label,col_order:c.order!==undefined?c.order:i,field_type:c.fieldType||'text'}));
        inserted=await this._fetch('project_columns',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify(colRows)});
      }catch(e){
        console.warn('field_type fallback:',e.message);
        const colRows=cols.map((c,i)=>({project_id:pid,label:c.label,col_order:c.order!==undefined?c.order:i}));
        inserted=await this._fetch('project_columns',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify(colRows)});
      }
      // localStorage에 fieldType 캐시 (DB 컬럼 유무와 무관하게 유지)
      if(inserted)this._saveFieldTypes(inserted.map((r,i)=>({id:r.id,fieldType:cols[i].fieldType||'text'})));
      return inserted;
    }
    return [];
  },
  async addColumn(pid,label,order,fieldType){
    let ins;
    try{
      ins=await this._fetch('project_columns',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({project_id:pid,label:label,col_order:order,field_type:fieldType||'text'})});
    }catch(e){
      ins=await this._fetch('project_columns',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({project_id:pid,label:label,col_order:order})});
    }
    return ins[0];
  },
  async deleteColumn(cid){
    await this._fetch('data_cells?column_id=eq.'+cid,{method:'DELETE',headers:HEADERS});
    await this._fetch('project_columns?id=eq.'+cid,{method:'DELETE',headers:HEADERS});
  },

  // ── Users ──
  async getUsers(projectId){
    const q=projectId?'users?project_id=eq.'+projectId+'&select=*':'users?select=*';
    return (await this._fetch(q)||[]).map(u=>({id:u.id,projectId:u.project_id,name:u.name,password:u.password,loginAttempts:u.login_attempts,lockedUntil:u.locked_until,createdAt:u.created_at}));
  },
  async getUserByName(projectId,name){
    const safeName=encodeURIComponent(name).replace(/'/g,'%27').replace(/\(/g,'%28').replace(/\)/g,'%29');
    const rows=await this._fetch('users?project_id=eq.'+projectId+'&name=eq.'+safeName+'&select=*&limit=1');
    if(!rows||!rows.length)return null;
    const u=rows[0];
    return {id:u.id,projectId:u.project_id,name:u.name,password:u.password,loginAttempts:u.login_attempts,lockedUntil:u.locked_until,createdAt:u.created_at};
  },
  async createUser(u){
    const ins=await this._fetch('users',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({project_id:u.projectId,name:u.name,password:u.password,login_attempts:0,locked_until:null})});
    return {id:ins[0].id,projectId:ins[0].project_id,name:ins[0].name,password:ins[0].password,loginAttempts:0,lockedUntil:null};
  },
  async updateUser(uid,data){
    const body={};
    if(data.password!==undefined)body.password=data.password;
    if(data.loginAttempts!==undefined)body.login_attempts=data.loginAttempts;
    if(data.lockedUntil!==undefined)body.locked_until=data.lockedUntil;
    await this._fetch('users?id=eq.'+uid,{method:'PATCH',headers:HEADERS_RETURN,body:JSON.stringify(body)});
  },

  // ── Rows ──
  async getRows(projectId){
    const q=projectId?'data_rows?project_id=eq.'+projectId+'&select=*&order=row_order':'data_rows?select=*&order=row_order';
    return (await this._fetch(q)||[]).map(r=>({id:r.id,projectId:r.project_id,userId:r.user_id,rowOrder:r.row_order,rowFileName:r.row_file_name||'',rowFileData:r.row_file_data||'',createdAt:r.created_at,updatedAt:r.updated_at}));
  },
  async createRow(r){
    const ins=await this._fetch('data_rows',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({project_id:r.projectId,user_id:r.userId||null,row_order:r.rowOrder,row_file_name:r.rowFileName||'',row_file_data:r.rowFileData||''})});
    return ins[0].id;
  },
  async deleteRows(ids){
    if(!ids.length)return;
    for(let i=0;i<ids.length;i+=50){
      const chunk=ids.slice(i,i+50);
      await this._fetch('data_cells?row_id=in.('+chunk.join(',')+')',{method:'DELETE',headers:HEADERS});
      await this._fetch('data_rows?id=in.('+chunk.join(',')+')',{method:'DELETE',headers:HEADERS});
    }
  },
  async deleteRowsByProject(pid){
    const rows=await this._fetch('data_rows?project_id=eq.'+pid+'&select=id');
    if(rows&&rows.length){
      const ids=rows.map(r=>r.id);
      for(let i=0;i<ids.length;i+=50){
        const chunk=ids.slice(i,i+50);
        await this._fetch('data_cells?row_id=in.('+chunk.join(',')+')',{method:'DELETE',headers:HEADERS});
      }
    }
    await this._fetch('data_rows?project_id=eq.'+pid,{method:'DELETE',headers:HEADERS});
  },
  async deleteRowsByUser(pid,uid){
    const rows=await this._fetch('data_rows?project_id=eq.'+pid+'&user_id=eq.'+uid+'&select=id');
    if(rows&&rows.length){
      const ids=rows.map(r=>r.id);
      for(let i=0;i<ids.length;i+=50){
        const chunk=ids.slice(i,i+50);
        await this._fetch('data_cells?row_id=in.('+chunk.join(',')+')',{method:'DELETE',headers:HEADERS});
        await this._fetch('data_rows?id=in.('+chunk.join(',')+')',{method:'DELETE',headers:HEADERS});
      }
    }
  },

  // ── Cells ──
  // light=true: file_data 제외 (관리자 목록용, 타임아웃 방지)
  // light=false: file_data 포함 (사용자 입력 pre-fill용)
  async getCells(rowIds,light=false){
    if(rowIds&&rowIds.length){
      const selectCols=light?'id,row_id,column_id,text_value,file_name,updated_at':'*';
      let all=[];
      for(let i=0;i<rowIds.length;i+=50){
        const chunk=rowIds.slice(i,i+50);
        const rows=await this._fetch('data_cells?row_id=in.('+chunk.join(',')+')'+'&select='+selectCols);
        all=all.concat(rows||[]);
      }
      return all.map(c=>({id:c.id,rowId:c.row_id,columnId:c.column_id,textValue:c.text_value||'',fileName:c.file_name||'',fileData:light?'':c.file_data||'',updatedAt:c.updated_at}));
    }
    return [];
  },
  async createCell(c){
    const ins=await this._fetch('data_cells',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({row_id:c.rowId,column_id:c.columnId,text_value:c.textValue||'',file_name:c.fileName||null,file_data:c.fileData||null})});
    return ins[0].id;
  },
  async createCells(cells){
    if(!cells.length)return;
    const body=cells.map(c=>({row_id:c.rowId,column_id:c.columnId,text_value:c.textValue||'',file_name:c.fileName||null,file_data:c.fileData||null}));
    await this._fetch('data_cells',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify(body)});
  },
  async updateCell(cid,data){
    const body={};
    if(data.textValue!==undefined)body.text_value=data.textValue;
    if(data.fileName!==undefined)body.file_name=data.fileName;
    if(data.fileData!==undefined)body.file_data=data.fileData;
    body.updated_at=new Date().toISOString();
    await this._fetch('data_cells?id=eq.'+cid,{method:'PATCH',headers:HEADERS_RETURN,body:JSON.stringify(body)});
  },
  async upsertCell(rowId,columnId,textValue){
    // Try to find existing
    const existing=await this._fetch('data_cells?row_id=eq.'+rowId+'&column_id=eq.'+columnId+'&select=*&limit=1');
    if(existing&&existing.length){
      await this._fetch('data_cells?id=eq.'+existing[0].id,{method:'PATCH',headers:HEADERS_RETURN,body:JSON.stringify({text_value:textValue,updated_at:new Date().toISOString()})});
    } else {
      await this._fetch('data_cells',{method:'POST',headers:HEADERS_RETURN,body:JSON.stringify({row_id:rowId,column_id:columnId,text_value:textValue,file_name:null,file_data:null})});
    }
  },
  async deleteCellsByColumn(cid){
    await this._fetch('data_cells?column_id=eq.'+cid,{method:'DELETE',headers:HEADERS});
  },

  // ── Version bump ──
  async bumpVersion(pid){
    // RPC 미사용 환경: read→increment→write (최소 경쟁 조건 방어: 재읽기 후 +1)
    for(let retry=0;retry<3;retry++){
      const ps=await this._fetch('projects?id=eq.'+pid+'&select=data_version');
      if(ps&&ps.length){
        const nv=(ps[0].data_version||0)+1;
        try{
          await this._fetch('projects?id=eq.'+pid,{method:'PATCH',headers:HEADERS_RETURN,body:JSON.stringify({data_version:nv})});
          return nv;
        }catch(e){if(retry>=2)throw e;await new Promise(r=>setTimeout(r,100))}
      }
    }
  },
  async getVersion(pid){
    const ps=await this._fetch('projects?id=eq.'+pid+'&select=data_version');
    return ps&&ps.length?ps[0].data_version||0:0;
  }
};

async function seedIfNeeded(){
  const ps=await DB.getProjects();
  if(ps.length>0)return;
  // Seed admin
  await DB.getAdmin();
  // Seed project 1

function genSlug(){const c='abcdefghijklmnopqrstuvwxyz0123456789';let s='';for(let i=0;i<8;i++)s+=c[Math.floor(Math.random()*c.length)];return s}

function showToast(msg,type='info'){
  const ct=document.getElementById('toast-container');
  const el=document.createElement('div');el.className='toast '+type;
  const ic={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  el.innerHTML=`<span>${ic[type]||''}</span><span>${msg}</span>`;ct.appendChild(el);
  setTimeout(()=>{el.style.animation='slideOut .3s ease';setTimeout(()=>el.remove(),300)},3000);
}

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;')}

function downloadFileFromData(fileName, dataUrl){
  if(!dataUrl)return;
  const a=document.createElement('a');a.href=dataUrl;a.download=fileName||'download';document.body.appendChild(a);a.click();document.body.removeChild(a);
}


// ── 주제 라벨 파싱 (🏵/🌼 주제 N. ... N-Y. 질문) ──
function parseTopicLabel(label){
  // "🏵 주제 N." 또는 "🌼 주제 N." 으로 시작하고, 중간에 "N-Y." 패턴이 나오면 분리
  const m=label.match(/^([🏵🌼✨🌸🌺🌻🌹🎯📌🔸🔹]\s*주제\s*\d+\.[\s\S]*?)(?=\s+\d+-\d+\.)/);
  if(m){
    const topic=m[1].trim();
    const rest=label.slice(m[0].length).trim();
    return {topic,label:rest};
  }
  return {topic:null,label:label};
}

// ── Column grouping engine for Type2 ──
function groupColumns(cols){
  const groups=[];
  const ungrouped=[];
  const groupMap={};

  cols.forEach(c=>{
    const label=c.label;
    // 1순위: "자녀N" 패턴 매칭 (자녀1, 자녀2, 자녀 3 등)
    const childMatch=label.match(/자녀\s*(\d+)/);
    // 2순위: "부모" 키워드만 (부서는 제외 — 자녀 소속부서와 혼동 방지)
    const parentMatch=/부모/.test(label);

    if(childMatch){
      const num=childMatch[1];
      const key='child-'+num;
      if(!groupMap[key]){groupMap[key]={title:'자녀 '+num+' 정보',icon:'👶',cols:[],order:10+parseInt(num)};groups.push(groupMap[key])}
      groupMap[key].cols.push(c);
    } else if(parentMatch){
      const key='parent';
      if(!groupMap[key]){groupMap[key]={title:'부모 정보',icon:'👨‍👩‍👧',cols:[],order:1};groups.push(groupMap[key])}
      groupMap[key].cols.push(c);
    } else {
      // ungrouped: 파일첨부 직전(맨 아래)에 배치됨
      ungrouped.push(c);
    }
  });

  groups.sort((a,b)=>a.order-b.order);
  return {groups,ungrouped};
}

    this.state.isEditing=true;
    // Read current text from the cell display
    const oldText=td.textContent.replace(/📎.*$/,'').trim();
    td.innerHTML=`<input type="text" class="cell-edit" value="${esc(oldText)}">`;
    const inp=td.querySelector('input');inp.focus();inp.select();
    const save=async()=>{
      const nv=inp.value;
      try{
        await DB.upsertCell(rid,cid,nv);
        await DB.bumpVersion(pid);
      }catch(e){console.error(e)}
      this.state.isEditing=false;
      await this.renderPV(pid);
    };
    inp.onblur=save;inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();save()}if(e.key==='Escape'){this.state.isEditing=false;this.renderPV(pid)}};
  },

  showCreateModal(){

          <div class="layout-option" data-lt="2"><div class="lo-icon">📝</div><div class="lo-title">Type 2 — 세로형</div><div class="lo-desc">폼(Form) 형식으로 입력</div></div>
        </div>
      </div>
      <div style="margin-bottom:12px"><label style="font-size:14px;font-weight:600;display:block;margin-bottom:12px">파악 항목 설정</label><div id="clist"></div>
      <button class="btn btn-outline btn-sm" id="aci" style="margin-top:8px">＋ 항목 추가</button></div>
      <p style="font-size:12px;color:var(--text-secondary)">⚠️ 항목은 최소 1개 이상</p>
      <div style="margin-top:16px;padding:16px;border:2px dashed var(--border);border-radius:12px;background:var(--bg-page)">
        <label style="font-size:14px;font-weight:600;display:block;margin-bottom:10px">📊 엑셀로 일괄 등록</label>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">• <strong>Type 1 (가로형)</strong>: 1행에 항목명, 2행부터 데이터 입력</p>
        <p style="font-size:12px;color:var(--text-secondary);margin-bottom:4px">• <strong>Type 2 (세로형)</strong>: 1열에 항목명을 세로로 나열</p>
        <p style="font-size:11px;color:var(--text-secondary);margin-bottom:12px">템플릿 다운로드 → 내용 작성 → 업로드하면 항목+데이터가 자동 반영됩니다.</p>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-secondary btn-sm" id="create-tpl-dl-h">📥 가로형 양식</button>
          <button class="btn btn-secondary btn-sm" id="create-tpl-dl-v">📥 세로형 양식</button>
          <label class="btn btn-main btn-sm" style="cursor:pointer">📤 엑셀 업로드<input type="file" accept=".csv,.txt" id="create-tpl-up" style="display:none"></label>
        </div>
      </div>
      <div class="modal-actions"><button class="btn btn-outline" id="npc">취소</button><button class="btn btn-accent" id="nps">✨ 프로젝트 생성</button></div></div>`;
    document.body.appendChild(ov);
    let selectedLayoutType=1;
    ov.querySelectorAll('.layout-option').forEach(opt=>{
      opt.onclick=()=>{ov.querySelectorAll('.layout-option').forEach(o=>o.classList.remove('selected'));opt.classList.add('selected');selectedLayoutType=+opt.dataset.lt};
    });
    let cols=[{label:''}];
    const render=()=>{
      const list=document.getElementById('clist');
      list.innerHTML=cols.map((c,i)=>`<div class="drag-item"><span class="drag-num">${i+1}</span><div class="drag-arrows"><button data-up="${i}" ${i===0?'disabled':''} title="위로">▲</button><button data-dn="${i}" ${i===cols.length-1?'disabled':''} title="아래로">▼</button></div><input type="text" value="${esc(c.label)}" data-i="${i}" placeholder="항목명"><div class="field-type-toggle"><button data-ft="${i}" data-type="text" class="${(c.fieldType||'text')==='text'?'active':''}">텍스트</button><button data-ft="${i}" data-type="file" class="${(c.fieldType||'text')==='file'?'active':''}">파일</button></div><span class="drag-del" data-d="${i}" ${cols.length<=1?'style="visibility:hidden"':''}>✕</span></div>`).join('');
      list.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{cols[+inp.dataset.i].label=inp.value});
      list.querySelectorAll('[data-d]').forEach(d=>d.onclick=()=>{if(cols.length<=1)return;cols.splice(+d.dataset.d,1);render()});
      list.querySelectorAll('[data-ft]').forEach(b=>b.onclick=()=>{const i=+b.dataset.ft;cols[i].fieldType=b.dataset.type;render()});
      list.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>{const i=+b.dataset.up;if(i>0){[cols[i-1],cols[i]]=[cols[i],cols[i-1]];render()}});
      list.querySelectorAll('[data-dn]').forEach(b=>b.onclick=()=>{const i=+b.dataset.dn;if(i<cols.length-1){[cols[i],cols[i+1]]=[cols[i+1],cols[i]];render()}});
    };
    render();document.getElementById('npn').focus();
    document.getElementById('aci').onclick=()=>{cols.push({label:''});render();const inps=document.querySelectorAll('#clist input');inps[inps.length-1].focus()};

    // ★ 가로형 양식: 성명,소속부서,연락처... 가로 한 줄에 나열
    document.getElementById('create-tpl-dl-h').onclick=(e)=>{
      e.preventDefault();
      const ec=cols.filter(c=>c.label.trim());
      const labels=ec.length>0?ec.map(c=>c.label.trim()):['성명','소속부서','연락처','차량번호','차량명'];
      // 1행: 항목명들이 가로로 나열 / 2행: 빈 데이터 행
      let csv='\uFEFF'+labels.map(l=>'"'+l.replace(/"/g,'""')+'"').join(',')+'\n';
      csv+=labels.map(()=>'').join(',')+'\n';
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='가로형_양식.csv';a.click();
      showToast('가로형 양식 다운로드 완료','success');
    };

    // ★ 세로형 양식: 항목명이 줄마다 하나씩 세로로 나열
    document.getElementById('create-tpl-dl-v').onclick=(e)=>{
      e.preventDefault();
      const ec=cols.filter(c=>c.label.trim());
      let csv;
      if(ec.length>0){
        csv='\uFEFF항목명,유형\n'+ec.map(c=>'"'+c.label.trim().replace(/"/g,'""')+'","'+(c.fieldType==='file'?'파일':'텍스트')+'"').join('\n')+'\n';
      } else {
        csv='\uFEFF항목명,유형\n성명,텍스트\n소속부서,텍스트\n연락처,텍스트\n첨부파일,파일\n';
      }
      const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='세로형_양식.csv';a.click();
      showToast('세로형 양식 다운로드 완료','success');
    };

    document.getElementById('create-tpl-up').onchange=(e)=>{
      const file=e.target.files[0];if(!file)return;
      const reader=new FileReader();
      reader.onload=(ev)=>{
        const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(l=>l);
        if(lines.length<1){showToast('데이터가 없습니다','warning');return}

        if(selectedLayoutType===1){
          // Type1 가로형: 1행의 각 셀이 항목명
          const headers=parseCSV(lines[0]);
          const newCols=headers.filter(h=>h.trim()).map(h=>({label:h.trim(),fieldType:'text'}));
          if(newCols.length===0){showToast('유효한 항목이 없습니다','warning');return}
          cols=newCols;render();
          showToast(`${newCols.length}개 항목이 반영되었습니다 (가로형)`,'success');
        } else {
          // Type2 세로형: 각 행의 1열이 항목명, 2열이 유형(선택)
          if(lines.length<2){showToast('데이터가 없습니다','warning');return}
          const newCols=lines.slice(1).map(l=>{
            const parsed=parseCSV(l);
            const label=parsed[0]||'';
            const ft=(parsed[1]||'').trim().toLowerCase();
            return {label:label,fieldType:ft==='파일'||ft==='file'?'file':'text'};
          }).filter(c=>c.label);
          if(newCols.length===0){showToast('유효한 항목이 없습니다','warning');return}
          cols=newCols;render();
          showToast(`${newCols.length}개 항목이 반영되었습니다 (세로형)`,'success');
        }
      };
      reader.readAsText(file,'UTF-8');
    };

    document.getElementById('npc').onclick=()=>ov.remove();ov.onclick=e=>{if(e.target===ov)ov.remove()};
    document.getElementById('nps').onclick=async()=>{
      const nm=document.getElementById('npn').value.trim();if(!nm){showToast('프로젝트명 필수','warning');return}
      const vc=cols.filter(c=>c.label.trim());if(!vc.length){showToast('항목 1개 이상 필수','warning');return}
      try{
        const ps=await DB.getProjects();
        const npId=await DB.createProject({name:nm,slug:genSlug(),displayOrder:ps.length,layoutType:selectedLayoutType,description:(document.getElementById('npdesc')?document.getElementById('npdesc').value:''),columns:vc.map(c=>({label:c.label.trim(),fieldType:c.fieldType||'text'}))});
        this.state.selectedProjectId=npId;ov.remove();
        showToast('프로젝트가 생성되었습니다! ✅','success');
        const nps=await DB.getProjects(),np=nps.find(x=>x.id===npId);
        if(np)navigator.clipboard.writeText(location.origin+location.pathname+'#/p/'+np.slug).then(()=>showToast('배포 URL 복사됨','info'));
        await this.renderSB();await this.renderPV(npId);
      }catch(e){
        console.error('프로젝트 생성 오류:',e);
        showToast('프로젝트 생성 중 오류가 발생했습니다','error');
      }
    };
  },

  // Polling
  startPolling(){
    this.stopPolling();
    let pollErrors=0;
    this.state.pollingInterval=setInterval(async()=>{
      if(this.state.isEditing||!this.state.selectedProjectId)return;
      const pid=this.state.selectedProjectId;
      try{
        const v=await DB.getVersion(pid);
        const cv=this.state._versions[pid]||0;
        if(v!==cv){this.state._versions[pid]=v;await this.renderPV(pid)}
        pollErrors=0;
      }catch(e){
        pollErrors++;
        if(pollErrors>=3){this.stopPolling();console.warn('폴링 중지: 서버 연결 실패');showToast('서버 연결 끊김. 새로고침 해주세요.','warning')}
      }
    },3000);
  },
  stopPolling(){if(this.state.pollingInterval){clearInterval(this.state.pollingInterval);this.state.pollingInterval=null}},

  // Excel
  async dlTemplate(pid){
    const ps=await DB.getProjects(),p=ps.find(x=>x.id===pid);if(!p)return;
    const cols=p.columns;
    let csv='\uFEFF'+'No.,'+cols.map(c=>'"'+c.label.replace(/"/g,'""')+'"').join(',')+'\n';
    csv+='1,'+cols.map(()=>'').join(',')+'\n';
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=p.name+'_양식.csv';a.click();showToast('양식 다운로드','success');
  },

  async exportCSV(pid){
    const ps=await DB.getProjects(),p=ps.find(x=>x.id===pid);if(!p)return;
    const cols=p.columns,rows=await DB.getRows(pid);
    const rowIds=rows.map(r=>r.id);
    const cells=rowIds.length?await DB.getCells(rowIds,true):[];
    let csv='\uFEFF'+'No.,'+cols.map(c=>'"'+c.label.replace(/"/g,'""')+'"').join(',')+'\n';
    rows.forEach((r,i)=>{csv+=`${i+1},${cols.map(c=>{const cl=cells.find(x=>x.rowId===r.id&&x.columnId===c.id);let v=cl?(cl.textValue||''):'';if(cl&&cl.fileName)v+=(v?' ':'')+'[파일:'+cl.fileName+']';return '"'+v.replace(/"/g,'""')+'"'}).join(',')}\n`});
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=p.name+'_데이터.csv';a.click();showToast('내보내기 완료','success');
  },

  async showImportModal(pid){
    const ov=document.createElement('div');ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal" style="max-width:600px"><h2>📤 엑셀 일괄 업로드</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">CSV 파일 선택. 첫 행=헤더.</p>
      <input type="file" accept=".csv,.txt" id="cfi" style="margin-bottom:16px">
      <div id="cpv" style="max-height:300px;overflow:auto;margin-bottom:16px"></div>
      <div class="modal-actions"><button class="btn btn-outline" id="icc">취소</button><button class="btn btn-accent hidden" id="icf">확정</button></div></div>`;
    document.body.appendChild(ov);let parsed=null;
    document.getElementById('cfi').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{
      const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(l=>l);if(lines.length<2){showToast('데이터 없음','warning');return}
      const hdr=parseCSV(lines[0]),data=lines.slice(1).map(l=>parseCSV(l));parsed={hdr,data};
      let h='<table class="data-table" style="font-size:12px"><thead><tr>';hdr.forEach(x=>h+=`<th style="padding:6px 8px">${esc(x)}</th>`);h+='</tr></thead><tbody>';
      data.forEach(d=>{h+='<tr>';d.forEach(x=>h+=`<td style="padding:6px 8px">${esc(x)}</td>`);h+='</tr>'});h+='</tbody></table>';
      document.getElementById('cpv').innerHTML=h;document.getElementById('icf').classList.remove('hidden');
    };rd.readAsText(f,'UTF-8')};
    document.getElementById('icc').onclick=()=>ov.remove();ov.onclick=e=>{if(e.target===ov)ov.remove()};
    document.getElementById('icf').onclick=async()=>{
      if(!parsed)return;
      const ps=await DB.getProjects(),p=ps.find(x=>x.id===pid),cols=p.columns;
      const existingRows=await DB.getRows(pid);
      const baseOrder=existingRows.length;
      for(let di=0;di<parsed.data.length;di++){
        const dl=parsed.data[di];
        const rid=await DB.createRow({projectId:pid,userId:null,rowOrder:baseOrder+di});
        const cellsToInsert=[];
        cols.forEach((col,ci)=>{
          const v=dl[ci+1]||'';
          if(v)cellsToInsert.push({rowId:rid,columnId:col.id,textValue:v,fileName:null,fileData:null});
        });
        if(cellsToInsert.length)await DB.createCells(cellsToInsert);
      }
      await DB.bumpVersion(pid);ov.remove();showToast(`${parsed.data.length}건 등록됨`,'success');await this.renderPV(pid);
    };
  },

  // ═══ USER LOGIN ═══
  async renderUserLogin(slug){
    const app=document.getElementById('app');
    let ps;
    try{ps=await DB.getProjects()}catch(e){app.innerHTML=`<div class="error-page"><div class="error-card"><div class="icon">⚠️</div><h2>서버 연결 오류</h2><p>잠시 후 다시 시도해주세요.</p></div></div>`;return}
    const p=ps.find(x=>x.slug===slug);
    if(!p){app.innerHTML=`<div class="error-page"><div class="error-card"><div class="icon">🔍</div><h2>프로젝트를 찾을 수 없습니다</h2><p>URL을 다시 확인해주세요.</p></div></div>`;return}
    app.innerHTML=`<div class="login-page"><div class="login-card">
      <div class="logo"><h1>People-In Hub</h1><p>${esc(p.name)}</p></div>
      <div class="form-group"><label>이름</label><input type="text" id="un" placeholder="이름 입력"></div>
      <div class="form-group"><label>비밀번호</label><input type="password" id="upw" placeholder="최초 등록 시 비밀번호: 316"></div>
      <div id="uerr" class="login-error hidden"></div>
      <button class="login-btn" id="ulb">로그인</button>
    </div></div>`;
    const ni=document.getElementById('un'),pi=document.getElementById('upw'),err=document.getElementById('uerr');
    const go=async()=>{
      const name=ni.value.trim(),pw=pi.value;if(!name){err.textContent='이름 필수';err.classList.remove('hidden');return}
      try{
        let u=await DB.getUserByName(p.id,name);
        if(!u){
          if(pw!=='316'){err.textContent='최초 등록 시 비밀번호는 316입니다';err.classList.remove('hidden');return}
          u=await DB.createUser({projectId:p.id,name,password:'316'});
          showToast(`${name}님 환영합니다!`,'success');
        } else {
          if(u.lockedUntil&&new Date(u.lockedUntil)>new Date()){err.textContent=`잠금 중. ${Math.ceil((new Date(u.lockedUntil)-new Date())/1000)}초 후`;err.classList.remove('hidden');return}
          if(pw!==u.password){
            const la=(u.loginAttempts||0)+1;
            if(la>=5){
              await DB.updateUser(u.id,{loginAttempts:0,lockedUntil:new Date(Date.now()+30000).toISOString()});
              err.textContent='5회 실패 — 30초 잠금';
            }else{
              await DB.updateUser(u.id,{loginAttempts:la});
              err.textContent=`비밀번호 불일치 (${la}/5)`;
            }
            err.classList.remove('hidden');return;
          }
          await DB.updateUser(u.id,{loginAttempts:0,lockedUntil:null});
          showToast(`${name}님 반갑습니다!`,'success');
        }
        App.state.userSession={userId:u.id,projectId:p.id,slug:p.slug,name:u.name};location.hash=`#/p/${slug}/input`;
      }catch(e){err.textContent='서버 오류';err.classList.remove('hidden');console.error(e)}
    };
    document.getElementById('ulb').onclick=go;pi.onkeydown=e=>{if(e.key==='Enter')go()};ni.onkeydown=e=>{if(e.key==='Enter')pi.focus()};ni.focus();
  },

  // ═══ USER INPUT ═══
  async renderUserInput(slug){
    const app=document.getElementById('app'),ses=this.state.userSession;if(!ses){location.hash='#/p/'+slug;return}
    let ps;
    try{ps=await DB.getProjects()}catch(e){return}
    const proj=ps.find(x=>x.slug===slug);if(!proj){location.hash='#/p/'+slug;return}
    const layoutType=proj.layoutType||1;
    const cols=proj.columns;
    const allRows=await DB.getRows(proj.id);
    const userRows=allRows.filter(r=>r.userId===ses.userId).sort((a,b)=>a.rowOrder-b.rowOrder);
    const rowIds=userRows.map(r=>r.id);
    const allCells=rowIds.length?await DB.getCells(rowIds):[];

    let rowsData=userRows.map(r=>{
      const rd={rowId:r.id,cells:{},files:{}};
      cols.forEach(c=>{const cell=allCells.find(cl=>cl.rowId===r.id&&cl.columnId===c.id);
        rd.cells[c.id]={textValue:cell?cell.textValue||'':'',fileName:cell?cell.fileName||'':'',fileData:cell?cell.fileData||'':''};
      });
      rd.rowFileName=r.rowFileName||'';
      rd.rowFileData=r.rowFileData||'';
      return rd;
    });
    if(rowsData.length===0) rowsData.push({rowId:null,cells:{},rowFileName:'',rowFileData:''});

    // sessionStorage에 임시 행 데이터가 있으면 사용 (행 추가/삭제 후)
    const tempRows=sessionStorage.getItem('pih_tempRows');
    if(tempRows){
      try{
        const t=JSON.parse(tempRows);
        sessionStorage.removeItem('pih_tempRows');
        rowsData=t.rowsData.map(r=>({rowId:null,cells:r.cells||{},rowFileName:'',rowFileData:''}));
        if(rowsData.length===0) rowsData.push({rowId:null,cells:{},rowFileName:'',rowFileData:''});
      }catch(e){sessionStorage.removeItem('pih_tempRows')}
    }

    const lastSaved=userRows.length?userRows[userRows.length-1].updatedAt:null;

    if(layoutType===1) this._renderType1(app,proj,cols,rowsData,lastSaved,slug,ses);
    else this._renderType2(app,proj,cols,rowsData,lastSaved,slug,ses);
  },

          <div class="user-info"><span>👤 ${esc(ses.name)}님</span><button id="upwb">🔑 비번변경</button><button id="ulogout">🚪 로그아웃</button></div>

                        return `<td class="row-file-cell"><label class="row-file-btn">📎 파일선택<input type="file" style="display:none" data-fidx="${idx}" data-fcid="${c.id}"></label><div class="fc-area" data-fca="${idx}-${c.id}">${cd.fileName?`<div class="file-preview-sm"><span>📎 ${esc(cd.fileName)}</span><span class="fremove" data-fcr="${idx}-${c.id}">✕</span></div>`:''}</div></td>`;

            ungrouped.forEach(c=>{
              const cd=rd.cells[c.id]||{textValue:'',fileName:'',fileData:''};
              const parsed=parseTopicLabel(c.label);
              // 주제 설명이 있으면: 그리드 닫고 주제 박스 표시 후 새 그리드 열기
              if(parsed.topic){
                if(gridOpen){html+=`</div>`;gridOpen=false}
                const tm=parsed.topic.match(/^([🏵🌼✨🌸🌺🌻🌹🎯📌🔸🔹]\s*주제\s*\d+\.\s*[^\n]+)/);
                const title=tm?tm[1]:parsed.topic.split(/\n/)[0];
                const desc=parsed.topic.slice(title.length).trim();
                html+=`<div class="topic-box"><div class="topic-title">${esc(title)}</div>${desc?`<div class="topic-desc">${esc(desc)}</div>`:''}</div>`;
              }
              if(!gridOpen){html+=`<div class="ungrouped-fields-grid">`;gridOpen=true}
              const displayLabel=parsed.label||c.label;
              if((c.fieldType||'text')==='file'){
                html+=`<div class="ungrouped-field"><label>${esc(displayLabel)}</label><div class="user-file-field" data-ufdrop="${c.id}"><div class="uf-icon">📁</div><div class="uf-text">파일 선택</div><input type="file" style="display:none" data-vfcid="${c.id}"><div class="uf-prev" data-vfpa="${c.id}">${cd.fileName?`<div class="uf-preview"><span>📎 ${esc(cd.fileName)}</span><span class="uf-remove" data-vfr="${c.id}">✕</span></div>`:''}</div></div></div>`;
              } else {
                html+=`<div class="ungrouped-field"><label>${esc(displayLabel)}</label><input type="text" data-idx="0" data-cid="${c.id}" value="${esc(cd.textValue)}" placeholder="입력"></div>`;
              }
            });
            if(gridOpen)html+=`</div>`;
            return html;
          })()}


          <div class="user-excel-section"><h3>📊 엑셀 일괄 입력</h3><div class="user-excel-btns"><button class="btn btn-secondary btn-sm" id="utpl">📥 양식 다운로드</button><button class="btn btn-secondary btn-sm" id="uexup">📤 엑셀 업로드</button></div></div>
          <div class="user-actions"><button class="save-btn" id="usave">💾 저장하기</button><button class="delete-my-btn" id="udel">🗑️ 내 데이터 전체 삭제</button></div>
          ${lastSaved?`<div class="last-saved">마지막 저장: ${new Date(lastSaved).toLocaleString('ko-KR')}</div>`:''}
        </div>
      </div>`;

    // File field handlers for Type2
    document.querySelectorAll('[data-ufdrop]').forEach(zone=>{
      const cid=zone.dataset.ufdrop;
      const inp=zone.querySelector('[data-vfcid]');
      zone.onclick=(e)=>{if(e.target.closest('.uf-remove'))return;inp.click()};
      inp.onclick=e=>e.stopPropagation();
      inp.onchange=e=>{
        const file=e.target.files[0];if(!file)return;
        if(file.size>20*1024*1024){showToast('파일 20MB 초과','error');return}
        const reader=new FileReader();reader.onload=ev=>{
          fileState[`0-${cid}`]={name:file.name,data:ev.target.result};
          const area=document.querySelector(`[data-vfpa="${cid}"]`);
          area.innerHTML=`<div class="uf-preview"><span>📎 ${esc(file.name)}</span><span class="uf-remove" data-vfr="${cid}">✕</span></div>`;
          area.querySelector('.uf-remove').onclick=(e2)=>{e2.stopPropagation();delete fileState[`0-${cid}`];area.innerHTML=''};
        };reader.readAsDataURL(file);
      };
    });
    document.querySelectorAll('[data-vfr]').forEach(btn=>{
      btn.onclick=(e)=>{e.stopPropagation();const cid=btn.dataset.vfr;delete fileState[`0-${cid}`];const area=document.querySelector(`[data-vfpa="${cid}"]`);if(area)area.innerHTML=''};
    });

    this._bindCommonUserEvents(proj,cols,rowsData,fileState,slug,ses,2);
  },

  // ── Common user event bindings ──
  _bindCommonUserEvents(proj,cols,rowsData,fileState,slug,ses,layoutType){
    document.getElementById('ulogout').onclick=()=>{this.state.userSession=null;location.hash='#/p/'+slug};
    document.getElementById('upwb').onclick=()=>this.showUserPwModal(ses.userId);
    document.getElementById('utpl').onclick=()=>this.dlTemplate(proj.id);
    document.getElementById('uexup').onclick=()=>this.showUserExcelUpload(proj.id,ses.userId,slug,cols);

    // 행 추가/삭제 — sessionStorage에 폼 상태 저장 후 페이지 재로드
    const saveToSession=()=>{
      this._saveFormState(cols,rowsData,fileState,layoutType);
      const state={rowsData:rowsData.map((rd,idx)=>{
        const r={cells:{},rowFileName:'',rowFileData:''};
        cols.forEach(c=>{
          if((c.fieldType||'text')==='file'){
            const fk=`${idx}-${c.id}`;
            const f=fileState[fk];
            r.cells[c.id]={textValue:'',fileName:f?f.name:'',fileData:f?f.data:''};
          } else {
            r.cells[c.id]=rd.cells[c.id]||{textValue:'',fileName:'',fileData:''};
          }
        });
        return r;
      })};
      sessionStorage.setItem('pih_tempRows',JSON.stringify(state));
    };

    const addRowFn=()=>{
      saveToSession();
      const s=JSON.parse(sessionStorage.getItem('pih_tempRows'));
      const emptyRow={cells:{}};
      cols.forEach(c=>{emptyRow.cells[c.id]={textValue:'',fileName:'',fileData:''}});
      s.rowsData.push(emptyRow);
      sessionStorage.setItem('pih_tempRows',JSON.stringify(s));
      this.renderUserInput(slug);
    };

    const delRowFn=(idx)=>{
      if(rowsData.length<=1){showToast('최소 1개 행은 유지됩니다','warning');return}
      saveToSession();
      const s=JSON.parse(sessionStorage.getItem('pih_tempRows'));
      s.rowsData.splice(idx,1);
      sessionStorage.setItem('pih_tempRows',JSON.stringify(s));
      this.renderUserInput(slug);
    };

    const addRowBtn=document.getElementById('uaddrow');
    if(addRowBtn) addRowBtn.onclick=addRowFn;
    const addRowBtn2=document.getElementById('uaddrow2');
    if(addRowBtn2) addRowBtn2.onclick=addRowFn;
    document.querySelectorAll('[data-delrow]').forEach(btn=>{btn.onclick=()=>delRowFn(+btn.dataset.delrow)});
    document.querySelectorAll('[data-mdelrow]').forEach(btn=>{btn.onclick=()=>delRowFn(+btn.dataset.mdelrow)});

    // Save (중복 방지: 버튼 비활성화 + delete→insert 원자적 처리)
    let isSaving=false;
    document.getElementById('usave').onclick=async()=>{
      if(isSaving)return; // 다중 클릭 방지
      isSaving=true;
      const saveBtn=document.getElementById('usave');
      saveBtn.disabled=true;saveBtn.textContent='⏳ 저장 중...';saveBtn.style.opacity='0.6';
      try{
        // 기존 행 삭제 (해당 사용자의 데이터만)
        await DB.deleteRowsByUser(proj.id,ses.userId);

        const allProjectRows=await DB.getRows(proj.id);
        const baseOrder=allProjectRows.length;
        const saveRows=layoutType===2?[rowsData[0]]:rowsData;

        for(let idx=0;idx<saveRows.length;idx++){
          const rd=saveRows[idx];
          const newRowId=await DB.createRow({
            projectId:proj.id,userId:ses.userId,rowOrder:baseOrder+idx,
            rowFileName:'',rowFileData:''
          });

          const cellsToInsert=[];
          cols.forEach(c=>{
            if((c.fieldType||'text')==='file'){
              const fk=`${idx}-${c.id}`;
              const file=fileState[fk]||null;
              if(file){
                cellsToInsert.push({rowId:newRowId,columnId:c.id,textValue:'',fileName:file.name,fileData:file.data});
              }
            } else {
              // 모바일 카드 input 우선 → PC 테이블 fallback
              let tv='';
              const mInp=document.querySelector(`input[data-midx="${idx}"][data-mcid="${c.id}"]`);
              const pcInp=document.querySelector(`input[data-idx="${idx}"][data-cid="${c.id}"]`);
              if(mInp&&mInp.offsetParent!==null&&mInp.value) tv=mInp.value;
              else if(pcInp&&pcInp.offsetParent!==null&&pcInp.value) tv=pcInp.value;
              else if(mInp&&mInp.value) tv=mInp.value;
              else if(pcInp&&pcInp.value) tv=pcInp.value;
              if(tv){
                cellsToInsert.push({rowId:newRowId,columnId:c.id,textValue:tv,fileName:null,fileData:null});
              }
            }
          });
          if(cellsToInsert.length)await DB.createCells(cellsToInsert);
        }

        await DB.bumpVersion(proj.id);
        showToast('저장되었습니다 ✅','success');await this.renderUserInput(slug);
      }catch(e){
        showToast('저장 오류','error');console.error(e);
        saveBtn.disabled=false;saveBtn.textContent='💾 저장하기';saveBtn.style.opacity='1';isSaving=false;
      }
    };

    // Delete all
    document.getElementById('udel').onclick=()=>{
      this.showConfirm('내 데이터 전체를 삭제하시겠습니까?',async()=>{
        await DB.deleteRowsByUser(proj.id,ses.userId);
        await DB.bumpVersion(proj.id);showToast('삭제됨','success');await this.renderUserInput(slug);
      });
    };
  },

  _saveFormState(cols,rowsData,fileState,layoutType){
    rowsData.forEach((rd,idx)=>{
      cols.forEach(c=>{
        if(!rd.cells[c.id])rd.cells[c.id]={textValue:'',fileName:'',fileData:''};
        // visible한 input에서 값 읽기 (모바일 우선)
        const minp=document.querySelector(`input[data-midx="${idx}"][data-mcid="${c.id}"]`);
        const pinp=document.querySelector(`input[data-idx="${idx}"][data-cid="${c.id}"]`);
        if(minp&&minp.offsetParent!==null&&minp.value) rd.cells[c.id].textValue=minp.value;
        else if(pinp&&pinp.offsetParent!==null&&pinp.value) rd.cells[c.id].textValue=pinp.value;
        else if(minp&&minp.value) rd.cells[c.id].textValue=minp.value;
        else if(pinp&&pinp.value) rd.cells[c.id].textValue=pinp.value;
      });
    });
  },

  async showUserPwModal(uid){
    const ov=document.createElement('div');ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal" style="max-width:400px"><h2>🔑 비밀번호 변경</h2>
      <div class="form-group"><label>현재 비밀번호</label><input type="password" id="upc"></div>
      <div class="form-group"><label>새 비밀번호 (4자 이상)</label><input type="password" id="upn"></div>
      <div class="form-group"><label>확인</label><input type="password" id="upcf"></div>
      <div id="upe" class="login-error hidden"></div>
      <div class="modal-actions"><button class="btn btn-outline" id="upcc">취소</button><button class="btn btn-accent" id="upcs">변경</button></div></div>`;
    document.body.appendChild(ov);
    document.getElementById('upcc').onclick=()=>ov.remove();ov.onclick=e=>{if(e.target===ov)ov.remove()};
    document.getElementById('upcs').onclick=async()=>{
      // fetch user from supabase
      // 특정 사용자만 조회 (전체 사용자 로드 방지)
      const rows=await DB._fetch('users?id=eq.'+uid+'&select=*&limit=1');
      const u=rows&&rows.length?{id:rows[0].id,password:rows[0].password}:null;if(!u)return;
      const c=document.getElementById('upc').value,n=document.getElementById('upn').value,cf=document.getElementById('upcf').value,err=document.getElementById('upe');
      if(c!==u.password){err.textContent='현재 비밀번호 불일치';err.classList.remove('hidden');return}
      if(n.length<4){err.textContent='4자 이상';err.classList.remove('hidden');return}
      if(n!==cf){err.textContent='불일치';err.classList.remove('hidden');return}
      await DB.updateUser(uid,{password:n});ov.remove();showToast('변경됨','success');
    };
  },

  async showUserExcelUpload(pid,userId,slug,projCols){
    const ov=document.createElement('div');ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal" style="max-width:600px"><h2>📤 엑셀 업로드</h2>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">CSV 업로드 시 기존 데이터를 덮어씁니다. <strong>여러 줄 데이터도 지원됩니다.</strong></p>
      <input type="file" accept=".csv,.txt" id="ucfi" style="margin-bottom:16px">
      <div id="ucpv" style="max-height:250px;overflow:auto;margin-bottom:16px"></div>
      <div class="modal-actions"><button class="btn btn-outline" id="uccc">취소</button><button class="btn btn-accent hidden" id="uccf">확정</button></div></div>`;
    document.body.appendChild(ov);let parsed=null;
    document.getElementById('ucfi').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=ev=>{
      const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(l=>l);if(lines.length<2){showToast('데이터 없음','warning');return}
      const hdr=parseCSV(lines[0]),data=lines.slice(1).map(l=>parseCSV(l));parsed={hdr,data};
      let h='<table class="data-table" style="font-size:12px"><thead><tr>';hdr.forEach(x=>h+=`<th style="padding:6px 8px">${esc(x)}</th>`);h+='</tr></thead><tbody>';
      data.forEach(d=>{h+='<tr>';d.forEach(x=>h+=`<td style="padding:6px 8px">${esc(x)}</td>`);h+='</tr>'});h+='</tbody></table>';
      document.getElementById('ucpv').innerHTML=h;document.getElementById('uccf').classList.remove('hidden');
    };rd.readAsText(f,'UTF-8')};
    document.getElementById('uccc').onclick=()=>ov.remove();ov.onclick=e=>{if(e.target===ov)ov.remove()};
    document.getElementById('uccf').onclick=async()=>{
      if(!parsed)return;
      const ps=await DB.getProjects(),p=ps.find(x=>x.id===pid),cols=p.columns;

      // Delete existing rows for this user
      await DB.deleteRowsByUser(pid,userId);

      const existingRows=await DB.getRows(pid);
      const baseOrder=existingRows.length;

      for(let di=0;di<parsed.data.length;di++){
        const dl=parsed.data[di];
        const rid=await DB.createRow({projectId:pid,userId:userId,rowOrder:baseOrder+di});
        const cellsToInsert=[];
        cols.forEach((col,ci)=>{
          const v=dl[ci+1]||'';
          if(v)cellsToInsert.push({rowId:rid,columnId:col.id,textValue:v,fileName:null,fileData:null});
        });
        if(cellsToInsert.length)await DB.createCells(cellsToInsert);
      }
      await DB.bumpVersion(pid);ov.remove();showToast(`${parsed.data.length}건 등록됨`,'success');await this.renderUserInput(slug);
    };
  },
};

function parseCSV(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(inQ){if(line[i]==='"'&&line[i+1]==='"'){cur+='"';i++}else if(line[i]==='"')inQ=false;else cur+=line[i]}
    else{if(line[i]==='"')inQ=true;else if(line[i]===','){r.push(cur.trim());cur=''}else cur+=line[i]}
  }
  r.push(cur.trim());return r;
}

App.init();
</script>
